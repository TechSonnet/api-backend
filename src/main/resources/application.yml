# 公共配置文件
spring:
  application:
    name: api-backend
  profiles:
    active: dev # 默认启动环境
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # session 配置
  session:
    timeout: 2592000 # 30 天过期
  # 数据库配置 (本地开发)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/my_db
    username: root
    password: root
  # Redis 配置 (本地开发)
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB

# 服务端配置
server:
  address: 0.0.0.0
  port: 8080
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000 # cookie 30 天过期

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 逻辑删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0

# 微信配置
wx:
  mp:
    token: xxx
    aesKey: xxx
    appId: xxx
    secret: xxx
    config-storage:
      http-client-type: HttpClient
      key-prefix: wx
      redis:
        host: 127.0.0.1
        port: 6379
      type: Memory
  open:
    appId: xxx
    appSecret: xxx

# 对象存储 (COS)
cos:
  client:
    accessKey: xxx
    secretKey: xxx
    region: xxx
    bucket: xxx

# 接口文档
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.sonnet.controller

# Dubbo 配置 (通用基础)
dubbo:
  application:
    name: api-backend-provider
    qos-enable: true
    qos-port: 22221
  protocol:
    name: dubbo
    port: 22222
  registry:
    id: nacos-registry
    address: nacos://127.0.0.1:8848
    use-file-cache: false
  metadata-report:
    address: nacos://127.0.0.1:8848
    file: ${user.home}/.dubbo/backend-metadata.cache